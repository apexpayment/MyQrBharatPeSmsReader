name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/MyQrBharatPeSmsReader-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyQrBharatPeSmsReader-debug
          path: release/MyQrBharatPeSmsReader-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          files: release/MyQrBharatPeSmsReader-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
